[pytest]
# Pytest Configuration for Driftwood Cafe Backend
# Phase 8: Testing & QA

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-config=.coveragerc
    --ignore=env
    --ignore=venv
    --ignore=node_modules
    --ignore=migrations

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, API)
    performance: Performance and load tests
    e2e: End-to-end tests
    slow: Tests that take more than 1 second
    auth: Authentication related tests
    payment: Payment integration tests
    admin: Admin functionality tests
    guest: Guest checkout tests

# Coverage options
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*.py
    */env/*
    */venv/*
    */migrations/*
    */node_modules/*
    */__pycache__/*
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
