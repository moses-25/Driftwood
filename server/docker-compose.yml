version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: driftwood_cafe
      POSTGRES_USER: driftwood_user
      POSTGRES_PASSWORD: driftwood_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftwood_user -d driftwood_cafe"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://driftwood_user:driftwood_password@db:5432/driftwood_cafe
      - FLASK_ENV=development
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: python run.py

volumes:
  postgres_data: